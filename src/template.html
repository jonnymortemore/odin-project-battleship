<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="ship-selection-container"></div>
    <div id="gameboards">
        <div class="gameboard" id="active_gameboard"></div>
        <div class="game-details">
            <div class="round-container">
                <div class="round-header">Round</div>
                <div class="round-counter"></div>
            </div>
            <div class="player-turn-container">
                <div class="player-turn-header">Current Turn</div>
                <div class="player-turn"></div>
            </div>
        </div>
        <div class="gameboard" id="enemy_gameboard"></div>
    </div>
    <div class="victory-container" hidden>
        <div>Game Over!</div>
        <div>And the winner is...</div>
        <div id="victory"></div>
    </div>
    <div class="button-container">
        <button id="reset_button">Game Reset</button>
        <button id="random_starting_position">Randomise Starting Position</button>
        <button id="start_game">Start Game</button>
    </div>
</body>
</html>
